        <script>
            function changeProject(text, imageSrc) {
                // Ändere den Infotext
                const infoText = document.getElementById('info-text');
                if (infoText) {
                    infoText.innerText = text;
                }
        
                // Ändere das Bild
                const infoImage = document.getElementById('info-image');
                if (infoImage) {
                    infoImage.src = imageSrc;
                }
            }
        </script>
